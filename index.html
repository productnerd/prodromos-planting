<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #F5F0E8;
  --paper: #FAF7F2;
  --sage: #8B9E7E;
  --sage-light: #C5D1BC;
  --forest: #3D5A3E;
  --forest-deep: #2A3F2B;
  --terracotta: #C17849;
  --terracotta-light: #E8C4A8;
  --ink: #3B3228;
  --ink-light: #6B5E52;
  --warm-gray: #A89E94;
  --divider: #D9D0C5;
  --section-trees: #5C7A52;
  --section-shrubs: #7B8E6B;
  --section-climbers: #8E7B6B;
  --section-cane: #9B6B7B;
  --section-perennials: #6B8E8B;
  --section-bulbs: #8B7B6B;
  --section-grasses: #6B7B5C;
  --section-seasonal: #B8956B;
}

body {
  font-family: 'Spectral', Georgia, serif;
  background-color: var(--cream);
  color: var(--ink);
  line-height: 1.5;
  font-size: 15px;
  min-height: 100vh;
  background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}

header {
  text-align: center;
  padding: 2.5rem 1.5rem 1.5rem;
  border-bottom: 1px solid var(--divider);
  background: linear-gradient(180deg, var(--paper) 0%, var(--cream) 100%);
}

header h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  color: var(--forest-deep);
  letter-spacing: -0.02em;
  margin-bottom: 0.25rem;
}

header .subtitle {
  font-family: 'Spectral', Georgia, serif;
  font-style: italic;
  color: var(--ink-light);
  font-size: 0.95rem;
  font-weight: 300;
}

.toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.75rem;
  padding: 1rem 1.5rem;
  background: var(--paper);
  border-bottom: 1px solid var(--divider);
  position: sticky;
  top: 0;
  z-index: 100;
}

.counter {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: 1.05rem;
  color: var(--forest);
  white-space: nowrap;
}

.counter span {
  color: var(--terracotta);
  font-weight: 700;
}

.toolbar-spacer { flex: 1; }

.btn {
  font-family: 'Spectral', Georgia, serif;
  font-size: 0.85rem;
  font-weight: 500;
  padding: 0.4rem 0.9rem;
  border: 1px solid var(--divider);
  border-radius: 4px;
  background: var(--paper);
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.btn:hover { background: var(--cream); border-color: var(--warm-gray); }
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--forest);
  color: var(--paper);
  border-color: var(--forest);
}
.btn-primary:hover { background: var(--forest-deep); }

.btn-accent {
  background: var(--terracotta);
  color: var(--paper);
  border-color: var(--terracotta);
}
.btn-accent:hover { background: #A8623A; }

.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.85rem;
  color: var(--ink-light);
  cursor: pointer;
  user-select: none;
}

.toggle-wrap input[type="checkbox"] {
  accent-color: var(--forest);
  width: 16px;
  height: 16px;
  cursor: pointer;
}

.search-box {
  font-family: 'Spectral', Georgia, serif;
  font-size: 0.85rem;
  padding: 0.4rem 0.75rem;
  border: 1px solid var(--divider);
  border-radius: 4px;
  background: var(--paper);
  color: var(--ink);
  width: 180px;
  outline: none;
}
.search-box:focus { border-color: var(--sage); }
.search-box::placeholder { color: var(--warm-gray); }

main { padding: 0 1.5rem 3rem; max-width: 1400px; margin: 0 auto; }

.section-group { margin-top: 1.5rem; }

.section-banner {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: 1.15rem;
  padding: 0.6rem 1rem;
  border-radius: 6px;
  color: #fff;
  margin-bottom: 0.5rem;
  letter-spacing: 0.01em;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.section-banner .section-count {
  font-family: 'Spectral', Georgia, serif;
  font-size: 0.75rem;
  font-weight: 400;
  opacity: 0.8;
  margin-left: auto;
}

.plant-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 0.85rem;
}

.plant-table thead th {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-light);
  padding: 0.5rem 0.6rem;
  border-bottom: 2px solid var(--divider);
  text-align: left;
  position: sticky;
  top: 52px;
  background: var(--cream);
  z-index: 10;
  white-space: nowrap;
}

.plant-table tbody tr {
  transition: background 0.1s;
}

.plant-table tbody tr:hover {
  background: rgba(139, 158, 126, 0.08);
}

.plant-table tbody tr.is-annual {
  border-left: 3px solid var(--terracotta);
}

.plant-table tbody td {
  padding: 0.45rem 0.6rem;
  border-bottom: 1px solid var(--divider);
  vertical-align: top;
  line-height: 1.45;
}

.plant-table tbody tr.is-annual td:first-child {
  padding-left: calc(0.6rem - 3px);
}

.cell-plant {
  font-weight: 500;
  color: var(--forest-deep);
  min-width: 140px;
}

.cell-notes {
  min-width: 140px;
}

.cell-notes textarea {
  font-family: 'Spectral', Georgia, serif;
  font-size: 0.82rem;
  width: 100%;
  min-height: 28px;
  padding: 4px 6px;
  border: 1px solid transparent;
  border-radius: 3px;
  background: transparent;
  color: var(--ink);
  resize: vertical;
  line-height: 1.4;
  transition: border-color 0.15s, background 0.15s;
}

.cell-notes textarea:hover { border-color: var(--divider); background: var(--paper); }
.cell-notes textarea:focus { border-color: var(--sage); background: var(--paper); outline: none; }

.cell-check {
  text-align: center;
  width: 40px;
}

.cell-check input[type="checkbox"] {
  accent-color: var(--forest);
  width: 18px;
  height: 18px;
  cursor: pointer;
}

.annual-badge {
  display: inline-block;
  font-family: 'Fraunces', Georgia, serif;
  font-size: 0.65rem;
  font-weight: 500;
  background: var(--terracotta-light);
  color: var(--terracotta);
  padding: 1px 6px;
  border-radius: 3px;
  margin-left: 6px;
  vertical-align: middle;
}

.season-dot {
  text-align: center;
  font-size: 0.8rem;
  background: rgba(139, 158, 126, 0.06);
  width: 55px;
  min-width: 55px;
}

.season-first {
  border-left: 2px solid var(--sage-light);
}

.season-last {
  border-right: 2px solid var(--sage-light);
}

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--warm-gray);
  font-style: italic;
}

footer {
  text-align: center;
  padding: 1.5rem;
  border-top: 1px solid var(--divider);
  color: var(--warm-gray);
  font-size: 0.8rem;
  font-style: italic;
}

/* Card layout for mobile */
@media (max-width: 900px) {
  .toolbar { padding: 0.75rem 1rem; gap: 0.5rem; }
  main { padding: 0 0.75rem 2rem; }

  .plant-table, .plant-table thead, .plant-table tbody,
  .plant-table th, .plant-table tr, .plant-table td {
    display: block;
  }
  .plant-table thead { display: none; }
  .plant-table tbody tr {
    background: var(--paper);
    border: 1px solid var(--divider);
    border-radius: 6px;
    padding: 0.75rem;
    margin-bottom: 0.5rem;
  }
  .plant-table tbody tr:hover { background: var(--paper); }
  .plant-table tbody tr.is-annual { border-left: 3px solid var(--terracotta); }
  .plant-table tbody td { border: none; padding: 0.2rem 0; }
  .plant-table tbody td::before {
    content: attr(data-label);
    font-family: 'Fraunces', Georgia, serif;
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--warm-gray);
    display: block;
    margin-bottom: 1px;
  }
  .cell-check { text-align: left; width: auto; }
  .cell-notes textarea { min-height: 36px; }
  .card-top {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.3rem;
  }
}

/* Print styles */
@media print {
  header { padding: 1rem; }
  .toolbar, .btn, .toggle-wrap, .search-box, footer, .cell-notes, .cell-check { display: none !important; }
  .plant-table thead th { position: static; background: #fff; }
  .section-banner { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .plant-table tbody tr { page-break-inside: avoid; }
  .plant-table tbody tr.print-hide { display: none !important; }
  .section-group.print-hide { display: none !important; }
  body { background: #fff; font-size: 11px; }
  main { padding: 0; max-width: 100%; }
  .print-show { display: table-cell !important; }
}

.hidden { display: none !important; }

.toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--forest-deep);
  color: var(--paper);
  padding: 0.6rem 1.2rem;
  border-radius: 6px;
  font-size: 0.85rem;
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 1000;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

const SECTION_COLORS = {
  trees: 'var(--section-trees)',
  shrubs: 'var(--section-shrubs)',
  climbers: 'var(--section-climbers)',
  cane: 'var(--section-cane)',
  perennials: 'var(--section-perennials)',
  bulbs: 'var(--section-bulbs)',
  grasses: 'var(--section-grasses)',
  seasonal: 'var(--section-seasonal)'
};

const COLUMNS = [
  {key:'plant', label:'🌱 Plant'},
  {key:'type', label:'🪴 Type'},
  {key:'lifecycle', label:'♻️ Lifecycle'},
  {key:'autumn', label:'🌦 Autumn'},
  {key:'winter', label:'❄️ Winter'},
  {key:'spring', label:'🌸 Spring'},
  {key:'sun', label:'☀️ Sun / Shade'},
  {key:'location', label:'📍 Location'},
  {key:'spacing', label:'↔️ Spacing'},
  {key:'depth', label:'⬇️ Depth'},
  {key:'watering', label:'💧 Watering'},
  {key:'tips', label:'📝 Tips'}
];

const SB_URL = 'https://knftyqkhampkqchoncel.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuZnR5cWtoYW1wa3FjaG9uY2VsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTE0NDg4MzYsImV4cCI6MjA2NzAyNDgzNn0.fugiTRvgoD3YqAZPQMV3R6Eu0Wx_9vgE6ZK8zjqFutg';
const SB_HEADERS = {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation'};

const PLAN_ID = 'prodromos-main';
let state = { notes: {}, checked: {} };
let saveTimer = null;

async function loadState() {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/prodromos_plans?id=eq.${PLAN_ID}&select=notes,checked`, {headers: SB_HEADERS});
    const rows = await res.json();
    if (rows.length && rows[0].notes) {
      state.notes = rows[0].notes;
      state.checked = rows[0].checked || {};
      try { localStorage.setItem('prodromos-planting', JSON.stringify(state)); } catch(e) {}
      return;
    }
  } catch(e) {}
  try {
    const saved = localStorage.getItem('prodromos-planting');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed.notes) state.notes = parsed.notes;
      if (parsed.checked) state.checked = parsed.checked;
    }
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem('prodromos-planting', JSON.stringify(state)); } catch(e) {}
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => syncToSupabase(), 1500);
}

function syncToSupabase() {
  fetch(`${SB_URL}/rest/v1/prodromos_plans`, {
    method: 'POST',
    headers: {...SB_HEADERS, 'Prefer': 'return=representation,resolution=merge-duplicates'},
    body: JSON.stringify({id: PLAN_ID, notes: state.notes, checked: state.checked, updated_at: new Date().toISOString()})
  }).catch(() => {});
}

function isAnnual(lifecycle) {
  return lifecycle && lifecycle.toLowerCase().includes('annual');
}

function updateCounter() {
  const total = PLANTS.reduce((n, s) => n + s.plants.length, 0);
  const checked = Object.values(state.checked).filter(Boolean).length;
  document.getElementById('counter').textContent = checked;
  document.getElementById('total').textContent = total;
}

function render() {
  const app = document.getElementById('app');
  const filterOnly = document.getElementById('filterToggle').checked;
  const search = document.getElementById('searchBox').value.toLowerCase().trim();
  let html = '';

  for (const section of PLANTS) {
    let plantRows = section.plants;
    if (filterOnly) plantRows = plantRows.filter(p => state.checked[p.id]);
    if (search) plantRows = plantRows.filter(p =>
      p.plant.toLowerCase().includes(search) ||
      p.type.toLowerCase().includes(search) ||
      p.tips.toLowerCase().includes(search) ||
      (state.notes[p.id] || '').toLowerCase().includes(search)
    );
    if (plantRows.length === 0) continue;

    const color = SECTION_COLORS[section.sectionKey];
    html += `<div class="section-group">`;
    html += `<div class="section-banner" style="background:${color}">${section.section}<span class="section-count">${plantRows.length} plant${plantRows.length !== 1 ? 's' : ''}</span></div>`;
    html += `<table class="plant-table"><thead><tr>`;
    html += `<th>📝 Notes</th><th style="width:40px">✅ Pick</th>`;
    for (const col of COLUMNS) {
      const cls = col.key === 'autumn' ? ' class="season-first"' : col.key === 'spring' ? ' class="season-last"' : '';
      html += `<th${cls}>${col.label}</th>`;
    }
    html += `</tr></thead><tbody>`;

    for (const p of plantRows) {
      const annual = isAnnual(p.lifecycle);
      const noteVal = (state.notes[p.id] || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
      const isChecked = state.checked[p.id] ? 'checked' : '';

      html += `<tr class="${annual ? 'is-annual' : ''}">`;
      html += `<td class="cell-notes" data-label="Notes"><textarea data-id="${p.id}" placeholder="Add notes...">${noteVal}</textarea></td>`;
      html += `<td class="cell-check" data-label="Final pick"><input type="checkbox" data-id="${p.id}" ${isChecked}></td>`;
      html += `<td class="cell-plant" data-label="Plant">${p.plant}${annual ? '<span class="annual-badge">Annual</span>' : ''}</td>`;
      html += `<td data-label="Type">${p.type}</td>`;
      html += `<td data-label="Lifecycle">${p.lifecycle}</td>`;
      html += `<td data-label="Autumn" class="season-dot season-first">${p.autumn}</td>`;
      html += `<td data-label="Winter" class="season-dot">${p.winter}</td>`;
      html += `<td data-label="Spring" class="season-dot season-last">${p.spring}</td>`;
      html += `<td data-label="Sun / Shade">${p.sun}</td>`;
      html += `<td data-label="Location">${p.location}</td>`;
      html += `<td data-label="Spacing">${p.spacing}</td>`;
      html += `<td data-label="Depth">${p.depth}</td>`;
      html += `<td data-label="Watering">${p.watering}</td>`;
      html += `<td data-label="Tips">${p.tips}</td>`;
      html += `</tr>`;
    }
    html += `</tbody></table></div>`;
  }

  if (!html) html = '<div class="empty-state">No plants match your current filters.</div>';
  app.innerHTML = html;
  updateCounter();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function exportCSV() {
  const checkedPlants = [];
  for (const section of PLANTS) {
    for (const p of section.plants) {
      if (!state.checked[p.id]) continue;
      checkedPlants.push({section: section.section, ...p});
    }
  }
  if (checkedPlants.length === 0) { toast('No plants selected for export'); return; }

  const headers = ['Section','Notes','Plant','Type','Lifecycle','Autumn','Winter','Spring','Sun / Shade','Location','Spacing','Planting Depth','Watering','Planting Tips'];
  const esc = v => `"${String(v||'').replace(/"/g,'""')}"`;
  let csv = headers.map(esc).join(',') + '\n';
  for (const p of checkedPlants) {
    csv += [p.section, state.notes[p.id]||'', p.plant, p.type, p.lifecycle, p.autumn, p.winter, p.spring, p.sun, p.location, p.spacing, p.depth, p.watering, p.tips].map(esc).join(',') + '\n';
  }
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'prodromos-planting-final.csv';
  a.click();
  toast('CSV exported');
}

// Event delegation
document.getElementById('app').addEventListener('input', e => {
  if (e.target.matches('textarea[data-id]')) {
    state.notes[e.target.dataset.id] = e.target.value;
    saveState();
  }
});

document.getElementById('app').addEventListener('change', e => {
  if (e.target.matches('input[type="checkbox"][data-id]')) {
    state.checked[e.target.dataset.id] = e.target.checked;
    saveState();
    updateCounter();
    if (document.getElementById('filterToggle').checked) render();
  }
});

document.getElementById('filterToggle').addEventListener('change', render);
document.getElementById('searchBox').addEventListener('input', render);
document.getElementById('btnPrint').addEventListener('click', () => {
  document.querySelectorAll('tbody tr').forEach(tr => {
    const cb = tr.querySelector('input[type="checkbox"][data-id]');
    if (cb && !cb.checked) tr.classList.add('print-hide');
  });
  document.querySelectorAll('.section-group').forEach(sg => {
    const visible = sg.querySelectorAll('tbody tr:not(.print-hide)');
    if (visible.length === 0) sg.classList.add('print-hide');
  });
  window.print();
  document.querySelectorAll('.print-hide').forEach(el => el.classList.remove('print-hide'));
});
document.getElementById('btnCSV').addEventListener('click', exportCSV);

loadState().then(render);
</script>
</body>
</html>
